<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover lets the app draw behind the iPhone notch/home
         indicator area, which the bottom nav's safe-area-inset padding then
         insets around -- without it, iOS just letterboxes the page instead
         of the full-bleed "real app" look. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Track shared household income, expenses, fixed bills, and savings, with charts and PDF reports." />

    <!-- Theme color for the browser UI / status bar, and PWA installability
         (manifest + icons) -- these are what let a phone user "Add to Home
         Screen" and get a real app icon, splash-style launch, and no browser
         chrome, and they're also the assets Capacitor will reuse later when
         this gets wrapped for the App Store / Play Store. -->
    <meta name="theme-color" content="#0d9488" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Hearth" />
    <meta name="mobile-web-app-capable" content="yes" />

    <title>Hearth -- Household Budget Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
